<!DOCTYPE html>
<html lang="en">
<head>
    <title>ID & Classes projesi</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        /*      GÖREVLER:
        **Tüm kutulara 200px genişlik ve yükseklik veriniz.
        **Tüm kutulara siyah border veriniz.
        **Box #1: kırmızı, Box #2: blue, Box #3: yeşil arka plan renklerini veriniz.
        **Tüm kutuları yan yana getirin.
        **Sayfa başlığını yüksekliğini 150px ve arka plan rengini gri yapınız.
        */


        .box{
            width: 300px;
            height: 300px;
            border: 1px solid black;
            display: inline-block;
        }

        #red{
            background-color: red;
        }
        
        #blue{
            background-color: blue;
        }

        .green{
            background-color: green;
        }

        #header{
            height: 150px;
            background-color: gray;
        }

    </style>

</head>
<body>

    <div id="header">
        Game Header
    </div>

    <div class="box" id="red">
        Box #1
    </div>

    <div class="box" id="blue">
        Box #2
    </div>

    <div class="box green">
        Box #3
    </div>

</body>
</html>
