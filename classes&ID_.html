<!DOCTYPE html>
<html lang="en">
<head>
    <title>ID & Classes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        p{
            font-size: 20px ;           /*Eğer font-size: 20px !important; yazsaydık tüm paragrafların yazı boyutunu sürekli şekilde 20px boyutunda tutabilecektik.*/
        }

        .red{
            color: red;
        }

        .blue{
            color: blue;
        }

        .font30{
            font-size: 30px;
        }

        .font40{
            font-size: 40px;
        }

        h2{
            color: green;
        }

        #header{
            font-size: 45px;
            color:cadetblue;
        }

       #paragraf{
        border: 1px
        solid blue;
       }

    </style>
</head>
<body>                  

    <h1 id="header">Udemy Kurslarımıza Hoşgeldiniz</h1>

    <h2>Udemy Kurslarımıza Hoşgeldiniz</h2>

    <p id="paragraf" class="red font30">Komple Uygulamalı Web Geliştirme</p>
    <p class="blue">Komple Uygulamalı Web Geliştirme</p>
    <p class="font30">Komple Uygulamalı Web Geliştirme</p>
    <p class="font40">Komple Uygulamalı Web Geliştirme</p>

</body>
</html>
