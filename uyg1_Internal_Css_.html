<!DOCTYPE html>
<html lang="en">
<head>
    <title>İlk Css Dersi</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        /*Internal(iç) Css: Internal CSS (Dahili CSS), "Style etiketlerinin arasına" yazılarak html etiketlerine 
        toplu bir şekilde css uygulamamızı sağlar.Yalnızca yazıldığı HTML dosyasının (sayfasının) içine etki eder. */
        

        h1{
            color: red;
            font-size: 50px;
            text-align: center;
        }


        p{
            color: coral;
            font-size: 20px;
            text-align: right;
        }

    </style>

</head>
<body>

    <h1>Web Geliştirme</h1>

    <p>Komple Uygulamalı Web Geliştirme</p>
    <p>Komple Uygulamalı Web Geliştirme</p>
    <p>Komple Uygulamalı Web Geliştirme</p>
    
</body>
</html>
