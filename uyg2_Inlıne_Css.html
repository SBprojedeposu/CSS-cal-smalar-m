<!DOCTYPE html>
<html lang="en">
<head>
    <title>İlk Css Dersi</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

       /*Inlıne CSS: Inline CSS, stil kurallarının doğrudan bir "HTML etiketi içerisine" style özniteliğiyle(attribute)
        yazılmasıdır.Sadece o spesifik etiketi etkiler.Ayrıca Inlıne css özelliği Internal css özelliğinden baskındır.
        Yalnızca içine yazıldığı etikete etki eder. */
    

        h1{
            color: blueviolet;
            font-size: 50px;
            text-align: center;
        }


        p{
            color: green;
            font-size: 20px;
            text-align: left;
            border: 1px solid black;
        }

    </style>

</head>
<body>
            <!--BURDA INLİNE(İÇ)CSS ile doğrudan etiketlerin içinde CSS uyguladık-->

    <h1 style="border: 2px solid red;">Web Geliştirme</h1>

    <p style="color: blue; font-size: 30px;">Komple Uygulamalı Web Geliştirme</p>  
    <p>Komple Uygulamalı Web Geliştirme</p>
    <p style="border: none;">Komple Uygulamalı Web Geliştirme</p>
    
</body>
</html>
